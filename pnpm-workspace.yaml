packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  # esbuild powers the Vite build — allow its install script.
  esbuild: true
  # Optional native deps pulled in by the Solana wallet adapters. All have JS
  # fallbacks / are unused in the MVP, so skip their native build scripts.
  '@stellar/stellar-sdk': false
  blake-hash: false
  bufferutil: false
  protobufjs: false
  tiny-secp256k1: false
  usb: false
  utf-8-validate: false
